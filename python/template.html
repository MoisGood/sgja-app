<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colaboradores - Andalien Sur</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f0f4f8; padding:24px; display:flex; justify-content:center; }
.container { max-width:1100px; width:100%; background:#fff; border-radius:16px; padding:24px; }
h1 { font-size:20px; font-weight:700; color:#1A3C6B; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { padding:8px 10px; text-align:left; font-weight:600; background:#1A3C6B; color:#fff; font-size:12px; }
td { padding:6px 10px; border-bottom:1px solid #e5e7eb; }
tr:hover { background:#f9fafb; }
.email-input { width:95%; padding:3px 6px; border:1px solid #d1d5db; border-radius:4px; font-size:12px; }
.activo-check { width:18px; height:18px; cursor:pointer; }
.btn { padding:8px 20px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex;align-items:center;gap:6px; }
.btn-primary { background:#1A3C6B; color:#fff; }
.btn-primary:hover { background:#15355e; }
.btn-success { background:#059669; color:#fff; }
.btn-success:hover { background:#047857; }
.barra { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.total { margin-top:12px; font-size:13px; color:#6b7280; }
.toast { position:fixed; bottom:20px; right:20px; padding:12px 20px; border-radius:8px; color:#fff; font-size:13px; z-index:999; display:none; }
.toast.ok { background:#059669; }
.toast.err { background:#dc2626; }
</style>
</head>
<body>
<div class="container">
<div class="barra">
<h1 style="margin:0;flex:1;">Colaboradores</h1>
<button class="btn btn-primary" onclick="descargarCSV()">Descargar CSV</button>
<button class="btn btn-success" onclick="enviarSolicitudes()">Enviar a Solicitudes de Registro</button>
<input type="file" id="csvFile" accept=".csv" style="display:none" onchange="procesarCSV(event)">
</div>
<table id="tabla">
<thead>
<tr><th>Id</th><th>Rut</th><th>Nombre</th><th>Email</th><th>Activo</th></tr>
</thead>
<tbody>__ROWS__</tbody>
</table>
<div class="total">Total: __TOTAL__ colaboradores</div>
</div>
<datalist id="sugerencias"></datalist>
<div id="toast" class="toast"></div>
<script>
var CORREOS = __CORREOS_JSON__;
var SUPABASE_URL = 'https://iyxubvtfhcmlivivdfpt.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5eHVidnRmaGNtbGl2aXZkZnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjUwNjgsImV4cCI6MjA5MTkwMTA2OH0.6nXx5oKcU8-gHNJCFBrrnzCYSwxPvVlOrSIp889GEW4';

var dl = document.getElementById('sugerencias');
CORREOS.forEach(function(c) { var o = document.createElement('option'); o.value = c; dl.appendChild(o); });
document.querySelectorAll('.email-input').forEach(function(i) { i.setAttribute('list', 'sugerencias'); });

function guardar() {
    var d = [];
    document.querySelectorAll('#tabla tbody tr').forEach(function(f) {
        d.push({
            id: f.children[0].textContent.trim(),
            email: f.querySelector('.email-input')?.value || '',
            activo: f.querySelector('.activo-check')?.checked || false
        });
    });
    localStorage.setItem('colab', JSON.stringify(d));
}
function cargar() {
    var g = localStorage.getItem('colab');
    if (!g) return;
    var d = JSON.parse(g);
    document.querySelectorAll('#tabla tbody tr').forEach(function(f, i) {
        if (i < d.length) {
            var e = f.querySelector('.email-input');
            var a = f.querySelector('.activo-check');
            if (e) e.value = d[i].email;
            if (a) a.checked = d[i].activo;
        }
    });
}
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('activo-check') || e.target.classList.contains('email-input')) guardar();
});
document.addEventListener('input', function(e) {
    if (e.target.classList.contains('email-input')) guardar();
});
window.onload = cargar;

function toast(msg, tipo) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + tipo;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 4000);
}

function descargarCSV() {
    var filas = document.querySelectorAll('#tabla tbody tr');
    var sel = [];
    filas.forEach(function(f) {
        var check = f.querySelector('.activo-check');
        if (check && check.checked) {
            var c = f.children;
            var rut = c[1].textContent.trim().replace(/\./g, '').replace(/\s/g, '');
            sel.push({
                id: c[0].textContent.trim(),
                rut: rut,
                nombre: c[2].textContent.trim(),
                email: f.querySelector('.email-input')?.value || ''
            });
        }
    });
    if (sel.length === 0) { toast('Marca usuarios en la columna Activo primero', 'err'); return; }
    var csv = '\uFEFFID,Rut,Nombre,Email\n';
    sel.forEach(function(s) { csv += s.id + ',' + s.rut + ',' + s.nombre + ',' + s.email + '\n'; });
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'colaboradores_seleccionados.csv';
    link.click();
    toast('CSV descargado', 'ok');
}

function parsearNombre(n) {
    var p = n.trim().split(' ');
    if (p.length <= 2) return { nombres: p[p.length-1] || '', apellidos: p[0] || '' };
    return { nombres: p.slice(2).join(' '), apellidos: p.slice(0,2).join(' ') };
}

function mostrarToastProgreso(msg, total, ok) {
    var t = document.getElementById('toast');
    t.innerHTML = msg + '<br><small>' + ok + ' de ' + total + '</small>';
    t.className = 'toast ok';
    t.style.display = 'block';
}

async function enviarSolicitudes() {
    // Primero pedir archivo CSV
    document.getElementById('csvFile').click();
}

async function procesarCSV(event) {
    var file = event.target.files[0];
    if (!file) return;
    event.target.value = '';

    var text = await file.text();
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length < 2) { toast('CSV vacio o sin datos', 'err'); return; }

    // Parsear CSV (con BOM)
    var header = lines[0].replace(/^\uFEFF/, '').split(',');
    var idxNombre = header.indexOf('Nombre');
    var idxEmail = header.indexOf('Email');
    var idxRut = header.indexOf('Rut');
    if (idxNombre < 0 || idxEmail < 0) { toast('CSV debe tener columnas: Nombre, Email', 'err'); return; }

    var rows = [];
    for (var i = 1; i < lines.length; i++) {
        var cols = lines[i].split(',');
        rows.push({
            nombre: cols[idxNombre] || '',
            email: cols[idxEmail] || '',
            rut: cols[idxRut] || ''
        });
    }

    if (rows.length === 0) { toast('No hay datos en el CSV', 'err'); return; }

    toast('Enviando ' + rows.length + ' solicitudes...', 'ok');
    var ok = 0, err = 0;

    for (var j = 0; j < rows.length; j++) {
        var r = rows[j];
        if (!r.email || !r.nombre) { err++; continue; }

        var p = parsearNombre(r.nombre);
        var uid = r.email;

        try {
            var res = await fetch(SUPABASE_URL + '/rest/v1/solicitudes_registro', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    uid: uid,
                    nombre: p.nombres,
                    apellidos: p.apellidos,
                    correo: r.email,
                    estado: 'pendiente'
                })
            });

            if (res.ok || res.status === 409) {
                ok++;
            } else {
                err++;
            }
        } catch(e) {
            err++;
        }

        if (j % 10 === 0) {
            mostrarToastProgreso('Enviando solicitudes...', rows.length, ok + err);
            await new Promise(function(r) { setTimeout(r, 0); });
        }
    }

    if (err === 0) {
        toast(ok + ' solicitudes enviadas correctamente', 'ok');
    } else {
        toast(ok + ' enviadas, ' + err + ' errores (algunos ya existian)', ok > 0 ? 'ok' : 'err');
    }
}
</script>
</body>
</html>
