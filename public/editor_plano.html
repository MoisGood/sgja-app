<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plano Edificio — Editor v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1e293b; color: #f1f5f9; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 1.3rem; }
  .sub { color: #94a3b8; font-size: .8rem; margin-bottom: .5rem; }

  .toolbar {
    display: flex; gap: .5rem; margin-bottom: .8rem; flex-wrap: wrap; align-items: center;
  }
  .toolbar button, .toolbar select {
    padding: .4rem .8rem; border-radius: 6px; border: 1px solid #475569;
    background: #0f172a; color: #f1f5f9; font-size: .75rem; cursor: pointer;
  }
  .toolbar button:hover { background: #1e293b; border-color: #3b82f6; }
  .toolbar label { font-size: .75rem; color: #94a3b8; display: flex; align-items: center; gap: .3rem; }
  .toolbar input[type="color"] { width: 30px; height: 26px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
  .toolbar input[type="number"] { width: 55px; background: #0f172a; border: 1px solid #475569; border-radius: 4px; padding: 2px 4px; color: #f1f5f9; font-size: .75rem; }
  .toolbar .sep { width: 1px; height: 24px; background: #475569; margin: 0 .2rem; }

  .mapa {
    position: relative;
    width: 1300px;
    height: 880px;
    background: #2d3a4f;
    border-radius: 10px;
    border: 2px solid #475569;
    user-select: none;
    overflow: hidden;
  }
  .mapa.grid-on {
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 145px 110px;
  }

  .room {
    position: absolute;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .6rem;
    font-weight: 500;
    text-align: center;
    cursor: grab;
    overflow: hidden;
    padding: 2px;
    line-height: 1.15;
    min-width: 20px;
    min-height: 20px;
    transition: box-shadow .12s;
    pointer-events: all;
    z-index: 1;
  }
  .room:hover { z-index: 10; border-color: rgba(255,255,255,.35); box-shadow: 0 3px 15px rgba(0,0,0,.5); }
  .room.editing { cursor: move; border-color: #fbbf24 !important; box-shadow: 0 0 0 2px #fbbf24; z-index: 20; }
  .room.editing .resize-handle { display: block; }
  .room.dragging { opacity: .8; z-index: 100; }
  .room.selected { outline: 2px solid #fbbf24; }
  .room .color-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    transition: background .2s;
  }

  .resize-handle {
    display: none;
    position: absolute;
    width: 10px; height: 10px;
    background: #fbbf24;
    border: 1px solid #000;
    border-radius: 2px;
    z-index: 5;
  }
  .rh-nw { top: -4px; left: -4px; cursor: nw-resize; }
  .rh-ne { top: -4px; right: -4px; cursor: ne-resize; }
  .rh-sw { bottom: -4px; left: -4px; cursor: sw-resize; }
  .rh-se { bottom: -4px; left: -4px; cursor: se-resize; }
  .rh-n  { top: -4px; left: 50%; margin-left: -5px; cursor: n-resize; }
  .rh-s  { bottom: -4px; left: 50%; margin-left: -5px; cursor: s-resize; }
  .rh-e  { top: 50%; right: -4px; margin-top: -5px; cursor: e-resize; }
  .rh-w  { top: 50%; left: -4px; margin-top: -5px; cursor: w-resize; }

  .room-label {
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.5);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    z-index: 1;
  }

  .xy-info {
    position: absolute;
    bottom: 4px; right: 6px;
    font-size: .5rem;
    color: rgba(255,255,255,.35);
    pointer-events: none;
  }
  .xy-info.hidden { display: none; }

  .legend {
    display: flex; gap: 1rem; margin-top: .8rem; flex-wrap: wrap; justify-content: center; font-size: .7rem;
  }
  .legend-item { display: flex; align-items: center; gap: .35rem; cursor: pointer; }
  .ldot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #0f172a; color: #f1f5f9; padding: .6rem 1.2rem; border-radius: 8px;
    border: 1px solid #334155; font-size: .8rem; z-index: 999;
    opacity: 0; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>🏢 Plano Edificio — Editor v2</h1>
<p class="sub">Arrastra · Esquinas redimensionan · Ctrl+C / Ctrl+V · Ctrl+D duplicar · Supr eliminar</p>

<div class="toolbar">
  <button onclick="toggleEdit()" id="btnEdit">✏️ Editar</button>
  <button onclick="addRoom()">➕ Añadir</button>
  <button onclick="deleteRoom()" id="btnDelete" style="opacity:.4">🗑️ Eliminar</button>
  <span class="sep"></span>
  <button onclick="copySelected()" id="btnCopy" style="opacity:.4">📋 Copiar</button>
  <button onclick="pasteCopies()" id="btnPaste" style="opacity:.4">📋 Pegar</button>
  <span class="sep"></span>
  <button onclick="exportJSON()">💾 JSON</button>
  <button onclick="document.getElementById('fileInput').click()">📂 Cargar</button>
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadJSONFile(event)">
  <button onclick="exportHTML()">📄 HTML</button>
  <button onclick="toggleGrid()">🔲 Cuadrícula</button>
  <button onclick="toggleMedidas()" id="btnMedidas">📏 Medidas</button>
  <span class="sep"></span>
  <button onclick="undo()" title="Ctrl+Z">↩️ Deshacer</button>
  <button onclick="redo()" title="Ctrl+Y">↪️ Rehacer</button>
  <span class="sep"></span>
  <label>Plantilla:
    <select onchange="setPreset(this.value)" style="width:100px">
      <option value="web">Web 1300×880</option>
      <option value="desktop">Desktop 1920×1080</option>
      <option value="tablet">Tablet 1024×768</option>
      <option value="movil">Móvil 375×812</option>
    </select>
  </label>
  <label>Ancho: <input type="number" id="mapW" value="1300" min="200" max="3000"></label>
  <label>Alto: <input type="number" id="mapH" value="880" min="200" max="3000"></label>
  <button onclick="resizeMap()">Aplicar</button>
  <span class="sep"></span>
  <label>Color sala: <input type="color" id="roomColorPicker" value="#6366f1" onchange="changeRoomColor(this.value)"></label>
</div>

<div class="mapa" id="mapa"></div>

<div class="legend" id="legend">
  <span class="legend-item" style="cursor:default">Da clic en una sala y elige su color arriba ↑</span>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const zoneLabels = {};
let rooms = [];
let editing = false;
let gridOn = false;
let nextId = 1;
let selectedId = null;
let clipboard = null;
let medidasVisibles = true;
let roomColors = {};  // keyed by room id (number) → hex color string

// ===== UNDO / REDO =====
const MAX_HISTORY = 50;
let historyStack = [];
let historyIdx = -1;

function snapshot() {
  return {
    rooms: rooms.map(r => ({ ...r })),
    roomColors: { ...roomColors },
    nextId,
  };
}

function applySnapshot(snap) {
  rooms = snap.rooms;
  roomColors = snap.roomColors;
  nextId = snap.nextId;
  selectedId = null;
  clearSelection();
  render();
  renderLegend();
}

function saveState() {
  // discard any future states beyond current index
  historyStack = historyStack.slice(0, historyIdx + 1);
  historyStack.push(snapshot());
  if (historyStack.length > MAX_HISTORY) historyStack.shift();
  historyIdx = historyStack.length - 1;
}

function undo() {
  if (historyIdx <= 0) { toast('↩️ No hay más acciones para deshacer'); return; }
  historyIdx--;
  applySnapshot(historyStack[historyIdx]);
  toast('↩️ Deshecho');
}

function redo() {
  if (historyIdx >= historyStack.length - 1) { toast('↪️ No hay más acciones para rehacer'); return; }
  historyIdx++;
  applySnapshot(historyStack[historyIdx]);
  toast('↪️ Rehecho');
}

// ===== COLOR PRESETS =====
const zoneColors = {
  'z-lab':'#0891b2','z-bib':'#0ea5e9','z-sala':'#8b5cf6','z-admin':'#3b82f6',
  'z-com':'#d97706','z-patio':'#4ade80','z-pasillo':'#64748b','z-acceso':'#22c55e',
  'z-park':'#78716c','z-internado':'#f43f5e','z-pie':'#a21caf','z-other':'#6366f1','z-empty':'#334155'
};
const zoneNameMap = {
  'z-lab':'Laboratorio','z-bib':'Biblioteca','z-sala':'Sala','z-admin':'Administración',
  'z-com':'Comedor','z-patio':'Patio','z-pasillo':'Pasillo','z-acceso':'Acceso',
  'z-park':'Estacionamiento','z-internado':'Internado','z-pie':'PIE','z-other':'Equipo','z-empty':'Sin uso'
};

// ===== LOAD JSON =====
function loadJSONFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const json = JSON.parse(e.target.result);
      if (!Array.isArray(json) || !json.length) throw new Error('JSON vacío o inválido');
      rooms = json.map((r,i) => ({
        id: nextId++, l:r.left, t:r.top, w:r.width, h:r.height, txt:r.text, cls:r.zone||'z-other'
      }));
      if (json[0].color !== undefined) {
        json.forEach((r,i) => { if (r.color) roomColors[rooms[i].id] = r.color; });
      }
      saveState();
      render();
      renderLegend();
      toast(`✅ Cargadas ${rooms.length} salas`);
    } catch(err) {
      toast('❌ Error: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== PRESETS =====
const presets = {
  web:     { w:1300, h:880 },
  desktop: { w:1920, h:1080 },
  tablet:  { w:1024, h:768 },
  movil:   { w:375,  h:812 },
};
function setPreset(val) {
  const p = presets[val];
  if (!p) return;
  document.getElementById('mapW').value = p.w;
  document.getElementById('mapH').value = p.h;
  resizeMap();
  toast(`📐 Plantilla ${val}: ${p.w}×${p.h}`);
}

// ===== INIT =====
function init() {
  render();
  renderLegend();
  document.getElementById('btnEdit').textContent = editing ? '🔒 Vista' : '✏️ Editar';
  saveState();
}

// ===== RENDER =====
function render() {
  const m = document.getElementById('mapa');
  m.innerHTML = '';
  rooms.forEach(r => {
    const el = document.createElement('div');
    el.className = `room ${r.cls}`;
    if (selectedId === r.id) el.classList.add('selected');
    el.dataset.id = r.id;
    el.style.left = r.l + 'px';
    el.style.top = r.t + 'px';
    el.style.width = r.w + 'px';
    el.style.height = r.h + 'px';

    const bgColor = roomColors[r.id] || zoneColors[r.cls] || '#6366f1';
    el.style.background = bgColor;

    const label = document.createElement('span');
    label.className = 'room-label';
    label.textContent = r.txt;
    el.appendChild(label);

    // resize handles
    ['nw','n','ne','e','se','s','sw','w'].forEach(dir => {
      const h = document.createElement('div');
      h.className = `resize-handle rh-${dir}`;
      h.dataset.dir = dir;
      el.appendChild(h);
    });

    // dblclick rename
    el.addEventListener('dblclick', () => {
      const name = prompt('Nombre:', r.txt);
      if (name && name.trim()) { saveState(); r.txt = name.trim(); render(); }
    });

    // click select
    el.addEventListener('click', (e) => {
      if (!editing) return;
      if (e.target.classList.contains('resize-handle')) return;
      selectRoom(el);
    });

    // drag
    el.addEventListener('mousedown', (e) => {
      if (!editing) return;
      if (e.target.classList.contains('resize-handle')) return;
      e.preventDefault();
      startDrag(e, el);
    });

    // resize
    el.querySelectorAll('.resize-handle').forEach(h => {
      h.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        startResize(e, el, h.dataset.dir);
      });
    });

    // xy info
    const info = document.createElement('div');
    info.className = 'xy-info' + (medidasVisibles ? '' : ' hidden');
    info.textContent = `${r.l},${r.t} ${r.w}×${r.h}`;
    el.appendChild(info);

    m.appendChild(el);
  });

  // click fondo → deselect
  m.addEventListener('click', (e) => {
    if (e.target === m) clearSelection();
  });

  updateEditing();
}

function clearSelection() {
  document.querySelectorAll('.room.selected').forEach(x => x.classList.remove('selected'));
  selectedId = null;
  document.getElementById('btnDelete').style.opacity = '.4';
  document.getElementById('btnCopy').style.opacity = '.4';
  document.getElementById('btnPaste').style.opacity = clipboard ? '1' : '.4';
}

// ===== UPDATE EDITING STATE =====
function updateEditing() {
  document.querySelectorAll('.room').forEach(el => {
    el.classList.toggle('editing', editing);
  });
}

// ===== DRAG =====
let dragData = null;
function startDrag(e, el) {
  const id = parseInt(el.dataset.id);
  const r = rooms.find(x => x.id === id);
  if (!r) return;
  const rect = document.getElementById('mapa').getBoundingClientRect();
  dragData = { el, id, ox: e.clientX - r.l - rect.left, oy: e.clientY - r.t - rect.top };
  el.classList.add('dragging');
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}
function onDrag(e) {
  if (!dragData) return;
  const rect = document.getElementById('mapa').getBoundingClientRect();
  const r = rooms.find(x => x.id === dragData.id);
  if (!r) return;
  r.l = Math.max(0, e.clientX - rect.left - dragData.ox);
  r.t = Math.max(0, e.clientY - rect.top - dragData.oy);
  dragData.el.style.left = r.l + 'px';
  dragData.el.style.top = r.t + 'px';
  const info = dragData.el.querySelector('.xy-info');
  if (info) info.textContent = `${Math.round(r.l)},${Math.round(r.t)} ${r.w}×${r.h}`;
}
function endDrag() {
  if (dragData) { dragData.el.classList.remove('dragging'); saveState(); dragData = null; }
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
}

// ===== RESIZE =====
let resizeData = null;
function startResize(e, el, dir) {
  const id = parseInt(el.dataset.id);
  const r = rooms.find(x => x.id === id);
  if (!r) return;
  resizeData = { el, id, dir, l:r.l, t:r.t, w:r.w, h:r.h, sx: e.clientX, sy: e.clientY };
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', endResize);
}
function onResize(e) {
  if (!resizeData) return;
  const r = rooms.find(x => x.id === resizeData.id);
  if (!r) return;
  const dx = e.clientX - resizeData.sx;
  const dy = e.clientY - resizeData.sy;
  const d = resizeData.dir;
  if (d.includes('w')) { r.l = resizeData.l + dx; r.w = resizeData.w - dx; }
  if (d.includes('e')) { r.w = resizeData.w + dx; }
  if (d.includes('n')) { r.t = resizeData.t + dy; r.h = resizeData.h - dy; }
  if (d.includes('s')) { r.h = resizeData.h + dy; }
  if (r.w < 20) r.w = 20;
  if (r.h < 20) r.h = 20;
  if (r.l < 0) r.l = 0;
  if (r.t < 0) r.t = 0;
  resizeData.el.style.left = r.l + 'px';
  resizeData.el.style.top = r.t + 'px';
  resizeData.el.style.width = r.w + 'px';
  resizeData.el.style.height = r.h + 'px';
  const info = resizeData.el.querySelector('.xy-info');
  if (info) info.textContent = `${Math.round(r.l)},${Math.round(r.t)} ${Math.round(r.w)}×${Math.round(r.h)}`;
}
function endResize() {
  if (resizeData) saveState();
  resizeData = null;
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', endResize);
}

// ===== SELECT =====
function selectRoom(el) {
  document.querySelectorAll('.room.selected').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  selectedId = parseInt(el.dataset.id);
  document.getElementById('btnDelete').style.opacity = '1';
  document.getElementById('btnCopy').style.opacity = '1';

  const r = rooms.find(x => x.id === selectedId);
  if (r && roomColors[r.id]) {
    document.getElementById('roomColorPicker').value = roomColors[r.id];
  } else if (r) {
    document.getElementById('roomColorPicker').value = zoneColors[r.cls] || '#6366f1';
  }
}

// ===== DELETE =====
function deleteRoom() {
  if (!selectedId) { toast('Selecciona una sala primero'); return; }
  if (!confirm('¿Eliminar esta sala?')) return;
  saveState();
  delete roomColors[selectedId];
  rooms = rooms.filter(r => r.id !== selectedId);
  selectedId = null;
  document.getElementById('btnDelete').style.opacity = '.4';
  document.getElementById('btnCopy').style.opacity = '.4';
  render();
  renderLegend();
  toast('🗑️ Eliminada');
}

// ===== COPY / PASTE =====
function copySelected() {
  if (!selectedId) { toast('Selecciona una sala primero'); return; }
  const src = rooms.find(r => r.id === selectedId);
  if (!src) return;
  clipboard = { ...src };
  document.getElementById('btnPaste').style.opacity = '1';
  toast(`📋 Copiada: "${src.txt}"`);
}

function pasteCopies() {
  if (!clipboard) { toast('No hay sala copiada'); return; }
  const cantidad = prompt('¿Cuántas copias pegar?', '1');
  if (!cantidad) return;
  const n = parseInt(cantidad);
  if (isNaN(n) || n < 1) { toast('Número inválido'); return; }
  saveState();

  // extract base name and number
  const baseName = clipboard.txt.replace(/\s*\(\d+\)\s*$/g, '').trim();
  const existing = rooms.filter(r => r.txt.startsWith(baseName)).length;

  for (let i = 0; i < n; i++) {
    const offset = (i + 1) * 25;
    const copyNum = existing + i + 1;
    rooms.push({
      id: nextId++,
      l: clipboard.l + offset,
      t: clipboard.t + offset,
      w: clipboard.w,
      h: clipboard.h,
      txt: `${baseName} (${copyNum})`,
      cls: clipboard.cls,
    });
    // copy color
    if (roomColors[clipboard.id]) {
      roomColors[nextId - 1] = roomColors[clipboard.id];
    }
  }
  render();
  toast(`📋 Pegadas ${n} copias de "${baseName}"`);
}

// ===== ROOM COLOR =====
function changeRoomColor(hex) {
  if (!selectedId) { toast('Selecciona una sala primero'); return; }
  saveState();
  roomColors[selectedId] = hex;
  const el = document.querySelector(`.room[data-id="${selectedId}"]`);
  if (el) el.style.background = hex;
}

// ===== TOGGLE EDIT =====
function toggleEdit() {
  editing = !editing;
  document.getElementById('btnEdit').textContent = editing ? '🔒 Vista' : '✏️ Editar';
  updateEditing();
}

// ===== ADD ROOM =====
function addRoom() {
  const name = prompt('Nombre de la nueva sala:') || 'Nueva sala';
  saveState();
  rooms.push({ id: nextId++, l: 100, t: 100, w: 140, h: 105, txt: name, cls: 'z-other' });
  roomColors[nextId - 1] = '#6366f1';
  render();
  if (!editing) toggleEdit();
}

// ===== GRID =====
function toggleGrid() {
  gridOn = !gridOn;
  document.getElementById('mapa').classList.toggle('grid-on', gridOn);
}

// ===== MEDIDAS =====
function toggleMedidas() {
  medidasVisibles = !medidasVisibles;
  document.querySelectorAll('.xy-info').forEach(el => el.classList.toggle('hidden', !medidasVisibles));
  document.getElementById('btnMedidas').textContent = medidasVisibles ? '📏 Medidas' : '📏 Ocultas';
}

// ===== RESIZE MAP =====
function resizeMap() {
  const w = parseInt(document.getElementById('mapW').value) || 1300;
  const h = parseInt(document.getElementById('mapH').value) || 880;
  document.getElementById('mapa').style.width = w + 'px';
  document.getElementById('mapa').style.height = h + 'px';
  toast(`📐 Mapa: ${w}×${h}`);
}

// ===== EXPORT JSON (with colors) =====
function exportJSON() {
  const data = rooms.map(r => ({
    left: Math.round(r.l), top: Math.round(r.t),
    width: Math.round(r.w), height: Math.round(r.h),
    text: r.txt, zone: r.cls,
    color: roomColors[r.id] || zoneColors[r.cls] || null,
  }));
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'plano_edificio.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ JSON exportado');
}

// ===== EXPORT HTML =====
function exportHTML() {
  const mw = document.getElementById('mapa').offsetWidth;
  const mh = document.getElementById('mapa').offsetHeight;
  let roomsHTML = '';
  rooms.forEach(r => {
    const bg = roomColors[r.id] || zoneColors[r.cls] || '#6366f1';
    roomsHTML += `  <div class="room" style="left:${Math.round(r.l)}px;top:${Math.round(r.t)}px;width:${Math.round(r.w)}px;height:${Math.round(r.h)}px;background:${bg}">${r.txt}</div>\n`;
  });
  // collect used zones for legend
  const usedZones = new Set(rooms.map(r => r.cls));
  let legendHTML = '';
  usedZones.forEach(k => {
    const bg = zoneColors[k] || '#6366f1';
    const name = zoneNameMap[k] || k;
    legendHTML += `  <span class="legend-item"><span class="ldot" style="background:${bg}"></span> ${name}</span>\n`;
  });
  const html = `<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plano Edificio</title>
<style>
body{font-family:system-ui,sans-serif;background:#1e293b;color:#f1f5f9;padding:1.5rem;display:flex;flex-direction:column;align-items:center}
.mapa{position:relative;width:${mw}px;height:${mh}px;background:#2d3a4f;border-radius:10px;border:2px solid #475569}
.room{position:absolute;border-radius:4px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:500;text-align:center;padding:2px;line-height:1.15;overflow:hidden;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.legend{display:flex;gap:1rem;margin-top:.8rem;flex-wrap:wrap;justify-content:center;font-size:.7rem}
.legend-item{display:flex;align-items:center;gap:.35rem}

</head>

${roomsHTML}</div>

</html>`;
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'plano_edificio.html';
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ HTML exportado');
}

// ===== LEGEND =====
function renderLegend() {
  const used = new Set(rooms.map(r => r.cls));
  const l = document.getElementById('legend');
  l.innerHTML = '';
  used.forEach(k => {
    const bg = zoneColors[k] || '#6366f1';
    const name = zoneNameMap[k] || k;
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="ldot" style="background:${bg}"></span> ${name}`;
    // click on legend → add room of that type
    item.addEventListener('click', () => {
      if (!editing) toggleEdit();
      saveState();
      rooms.push({ id: nextId++, l: 60 + rooms.length * 15, t: 60 + rooms.length * 15, w: 140, h: 105, txt: `${name} ${rooms.filter(r=>r.cls===k).length+1}`, cls: k });
      roomColors[nextId - 1] = bg;
      render();
      toast(`➕ Añadida ${name}`);
    });
    l.appendChild(item);
  });
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
    e.preventDefault();
    redo();
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Supr') && selectedId && editing) {
    deleteRoom();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd' && selectedId && editing) {
    e.preventDefault();
    copySelected();
    // auto-paste 1 copy
    clipboard = rooms.find(r => r.id === selectedId);
    if (clipboard) pasteCopies();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && selectedId) {
    e.preventDefault();
    copySelected();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v' && clipboard) {
    e.preventDefault();
    pasteCopies();
  }
});

init();
</script>
</body>
</html>
