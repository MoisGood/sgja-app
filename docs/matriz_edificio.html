<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matriz Edificio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1e293b; color: #f1f5f9; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
  h2 { font-size: 1.2rem; margin-bottom: .25rem; }
  .sub { color: #94a3b8; font-size: .8rem; margin-bottom: 1rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 100px);
    grid-template-rows: repeat(8, 80px);
    gap: 4px;
    background: #334155;
    padding: 6px;
    border-radius: 10px;
  }
  .cell {
    background: #1e293b;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .9rem;
    font-weight: 700;
    color: #475569;
    border: 1px solid #475569;
    cursor: pointer;
    transition: .1s;
  }
  .cell:hover { background: #0f172a; color: #94a3b8; }

  .ref { margin-top: 1.5rem; width: 100%; max-width: 820px; }
  .ref table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .ref th { text-align: left; padding: .3rem .5rem; background: #0f172a; color: #94a3b8; border-bottom: 1px solid #334155; }
  .ref td { padding: .3rem .5rem; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  .ref input { background: #0f172a; border: 1px solid #334155; border-radius: 4px; padding: .2rem .4rem; color: #f1f5f9; width: 100%; font-size: .8rem; }
  .ref input:focus { outline: none; border-color: #3b82f6; }
</style>
</head>
<body>

<h2>🗺️ Matriz del Edificio</h2>
<p class="sub">Cada celda tiene un número. Dime qué sala va en cada número.</p>

<div class="grid" id="grid"></div>

<div class="ref">
  <table>
    <thead><tr><th>#</th><th>Sala</th><th>#</th><th>Sala</th><th>#</th><th>Sala</th><th>#</th><th>Sala</th></tr></thead>
    <tbody id="ref-body"></tbody>
  </table>
</div>

<script>
  const grid = document.getElementById('grid');
  const refBody = document.getElementById('ref-body');
  const totalCells = 64;

  for (let i = 1; i <= totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = i;
    cell.dataset.num = i;
    cell.addEventListener('click', () => {
      const name = prompt(`Nombre para celda ${i}:`);
      if (name) cell.textContent = i + ' ' + name;
    });
    grid.appendChild(cell);
  }

  // Reference list in groups of 4
  let row = '';
  for (let i = 1; i <= totalCells; i += 4) {
    row += '<tr>';
    for (let j = 0; j < 4 && i + j <= totalCells; j++) {
      const n = i + j;
      row += `<td style="color:#64748b;font-weight:600">${n}</td><td><input placeholder="---" id="inp-${n}"></td>`;
    }
    row += '</tr>';
  }
  refBody.innerHTML = row;

  // Sync inputs with grid clicks
  document.querySelectorAll('.cell').forEach(c => {
    c.addEventListener('click', () => {
      const inp = document.getElementById(`inp-${c.dataset.num}`);
      setTimeout(() => {
        const name = c.textContent.replace(/^\d+\s*/, '');
        if (inp && name) inp.value = name;
      }, 50);
    });
  });
</script>
</body>
</html>
